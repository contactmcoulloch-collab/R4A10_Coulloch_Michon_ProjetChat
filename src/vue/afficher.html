<!DOCTYPE html>
<head>
	<meta charset="UTF-8">
	<title>Chat</title>
	<script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script src="enregistrement.js"></script>
    <script src="recuperation.js"></script>
    <link rel="stylesheet" href="designChat.css">
<h2>Ma messagerie</h2>
    <div id="container">
    <div class="container">
        <div id="top">
            <h3>Mon pseudo :</h3>
            <input type="text" id="pseudo" name="pseudo" placeholder="Entrez votre pseudo">
        </div>
        
        <div class="message-area">
            <h3>Message :</h3>
            <textarea id="message" name="message" rows="4" cols="50" placeholder="Écrivez votre message ici"></textarea>
            <input type="button" value="Envoyer" id="btnEnvoie" class="btn">
        </div>
    </div>

    <div id ="inbox" class="inbox">
        <!-- Messages will be displayed here -->
    </div>
</div>
