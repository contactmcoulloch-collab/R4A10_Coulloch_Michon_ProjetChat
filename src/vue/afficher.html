<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script src="enregistrement.js"></script>
    <script src="recuperation.js"></script>
    <link rel="stylesheet" href="designChat.css">
</head>

<body>
    <h2>Ma messagerie</h2>
    <div id="container">
        <div class="container">
            <div class="controom" id="contbtnroom">
                <div class="btnroom" id="br1">Room 1</div>
                <div class="btnroom" id="br2">Room 2</div>
                <div class="btnroom" id="br3">Room 3</div>
                <div class="btnroom" id="br4">Room 4</div>
                <div class="btnroom" id="br5">Room 5</div>
            </div>
            <form id="chat">
                <div id="top">
                     <input type="text" id="noroommsg" name="noroommsg" hidden>
                   <h3>Mon pseudo :</h3>
                    <input type="text" id="pseudo" name="pseudo" placeholder="Entrez votre pseudo">
                </div>
 
                <div class="message-area">
                    <h3>Message :</h3>
                    <textarea id="message" name="message" rows="4" cols="50"
                        placeholder="Écrivez votre message ici"></textarea>
                    <input type="button" value="Envoyer" id="btnEnvoie" class="btn">
                </div>
            </form>
        </div>
        <div class="container">
            <div id="wtitre"><h3>Vous etes dans la Room <span id="noroom"> - (Choisir votre Room de chat) </span></h3></div>
            <div id="inbox" class="inbox">
                <!-- Messages will be displayed here -->
            </div>
        </div>
    </div>
</body>
